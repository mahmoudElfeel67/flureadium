name: Integration Tests

on:
  push:
    branches: [main]

jobs:
  integration-android:
    name: Integration Tests (Android)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flureadium/example
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '18'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable KVM (emulator acceleration)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: Nexus 6
          working-directory: flureadium/example
          script: flutter test integration_test/all_tests_android_ci.dart

  integration-ios:
    name: Integration Tests (iOS)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: flureadium/example
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update

      - name: Boot simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep "iPhone" | head -1 | grep -oE '\([A-F0-9-]+\)' | tr -d '()')
          if [ -z "$UDID" ]; then
            echo "No available iPhone simulator found"
            xcrun simctl list devices
            exit 1
          fi
          echo "Booting simulator: $UDID"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID"

      - name: Run integration tests
        run: |
          UDID=$(xcrun simctl list devices booted | grep "iPhone" | grep -oE '\([A-F0-9-]+\)' | tr -d '()' | head -1)
          flutter test integration_test/all_tests.dart -d "$UDID"

      - name: Shutdown simulator
        if: always()
        run: xcrun simctl shutdown all || true

  integration-web:
    name: Integration Tests (Web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flureadium/example
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Copy JS file
        run: dart run flureadium:copy_js_file web/

      - name: Start Xvfb virtual display
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Start ChromeDriver
        run: chromedriver --port=4444 &

      - name: Wait for ChromeDriver
        run: |
          for i in $(seq 1 10); do
            curl -s http://localhost:4444/status > /dev/null 2>&1 && break
            sleep 1
          done

      - name: Run integration tests (Web)
        run: |
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/all_tests_web.dart \
            -d chrome \
            --profile

name: Integration Tests

on:
  push:
    branches: [main]

jobs:
  integration-android:
    name: Integration Tests (Android)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flureadium/example
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '18'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable KVM (emulator acceleration)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: Nexus 6
          working-directory: flureadium/example
          script: flutter test integration_test/all_tests.dart --exclude-tags native

  integration-ios:
    name: Integration Tests (iOS)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: flureadium/example
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update

      - name: Boot simulator
        run: |
          UDID=$(xcrun simctl create "TestDevice" \
            "com.apple.CoreSimulator.SimDeviceType.iPhone-15" \
            "com.apple.CoreSimulator.SimRuntime.iOS-17-0")
          xcrun simctl boot "$UDID"
          echo "SIM_UDID=$UDID" >> $GITHUB_ENV

      - name: Run integration tests
        run: flutter test integration_test/all_tests.dart -d ${{ env.SIM_UDID }}

      - name: Shutdown simulator
        if: always()
        run: xcrun simctl shutdown ${{ env.SIM_UDID }}

  integration-web:
    name: Integration Tests (Web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flureadium/example
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Copy JS file
        run: dart run flureadium:copy_js_file web/

      - name: Run integration tests (Chrome, exclude native-only)
        run: flutter test integration_test/ -d chrome --exclude-tags native

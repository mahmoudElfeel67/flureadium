group 'dev.mulev.lyt.flureadium'
version '1.0-SNAPSHOT'

buildscript {
  ext.kotlin_version = '2.2.20'
  ext.readium_version = '3.1.2'

  repositories {
    google()
    mavenCentral()
    maven { url 'https://jitpack.io' }
  }

  dependencies {
    classpath 'com.android.tools.build:gradle:8.13.0'
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
  }
}

rootProject.allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://jitpack.io' }
    maven { url 'https://storage.googleapis.com/download.flutter.io' }
  }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

import org.jetbrains.kotlin.gradle.dsl.JvmTarget

android {
  if (project.android.hasProperty('namespace')) {
    namespace 'dev.mulev.flureadium'
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_18
    targetCompatibility JavaVersion.VERSION_18
  }

  kotlin {
    compilerOptions {
      jvmTarget = JvmTarget.JVM_18
    }
  }

  compileSdkVersion 35

  sourceSets {
    main.java.srcDirs += 'src/main/kotlin'
    main.res.srcDirs += 'src/main/res'
  }
  defaultConfig {
    minSdkVersion 24
  }

  buildFeatures {
    viewBinding = true
  }

  testOptions {
    unitTests.returnDefaultValues = true
  }
}

dependencies {
  implementation 'androidx.fragment:fragment-ktx:1.8.9'

  implementation fileTree(include: ['*.jar'], dir: 'libs')
  implementation "org.readium.kotlin-toolkit:readium-shared:$readium_version"
  implementation "org.readium.kotlin-toolkit:readium-streamer:$readium_version"
  implementation "org.readium.kotlin-toolkit:readium-opds:$readium_version"
  implementation "org.readium.kotlin-toolkit:readium-navigator:$readium_version"
  implementation "org.readium.kotlin-toolkit:readium-navigator-media-common:$readium_version"
  implementation "org.readium.kotlin-toolkit:readium-navigator-media-tts:$readium_version"
  implementation "org.readium.kotlin-toolkit:readium-navigator-media-audio:$readium_version"
  implementation "org.readium.kotlin-toolkit:readium-adapter-exoplayer-audio:$readium_version"
  // implementation "org.readium.kotlin-toolkit:readium-adapter-pspdfkit-document:$readium_version"
  // implementation "org.readium.kotlin-toolkit:readium-adapter-pspdfkit-navigator:$readium_version"

  // PDF support via Pdfium adapter (open source)
  implementation "org.readium.kotlin-toolkit:readium-adapter-pdfium-document:$readium_version"
  implementation "org.readium.kotlin-toolkit:readium-adapter-pdfium-navigator:$readium_version"
  //implementation "org.readium.kotlin-toolkit:readium-lcp:$readium_version"

  // Used for media-session controls
  def media_version = "1.8.0"
  implementation "androidx.media3:media3-common:$media_version"
  implementation "androidx.media3:media3-session:$media_version"
  implementation "androidx.media3:media3-exoplayer:$media_version"

  implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-core:1.10.2'
  implementation "org.jetbrains.kotlinx:kotlinx-serialization-json:1.9.0"
  implementation 'androidx.constraintlayout:constraintlayout:2.2.1'

  // Flutter embedding — compileOnly so it's available when building standalone
  // (e.g. for running Android unit tests via ./gradlew testDebugUnitTest).
  // The Flutter Gradle plugin provides this at runtime in the normal app build.
  compileOnly 'io.flutter:flutter_embedding_debug:1.0.0-587c18f873b8ab57330422bce09047420d9c7f42'

  testImplementation 'io.flutter:flutter_embedding_debug:1.0.0-587c18f873b8ab57330422bce09047420d9c7f42'
  testImplementation "org.jetbrains.kotlin:kotlin-test:$kotlin_version"
  testImplementation 'org.mockito:mockito-core:5.17.0'
  // Provides real org.json.JSONObject/JSONArray in JVM unit tests (Android stubs are no-ops).
  testImplementation 'org.json:json:20240303'
  // Robolectric provides real Android framework implementations (android.net.Uri etc.) in JVM tests.
  testImplementation 'org.robolectric:robolectric:4.14.1'
}
